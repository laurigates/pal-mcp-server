name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Explicit grant so the reusable workflow gets the token scopes it declares
# (incl. id-token: write for OIDC) even when the repo's default workflow
# permissions are read-only.
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    uses: laurigates/.github/.github/workflows/reusable-claude-review.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      plugin_marketplaces: |
        https://github.com/laurigates/claude-plugins.git
      plugins: |
        code-quality-plugin@laurigates-claude-plugins
        testing-plugin@laurigates-claude-plugins
